<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E3DC SOH-Monitor</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>SOH-Monitor <span class="sub">· E3DC S10</span></h1>
        <span id="systemTag" class="system-tag">Modul 0 · prüfe Zellblöcke</span>
      </header>

      <section class="karte status">
        <div class="soh-gross">
          <div class="wert"><span id="sohWert">--</span><small> %</small></div>
          <div class="label">State of Health</div>
        </div>

        <div class="kennzahlen-block">
          <div class="kennzahlen">
            <div class="kz">
              <div class="wert" id="rsocWert">--</div>
              <div class="label">Ladezustand (SOC)</div>
            </div>
            <div class="kz">
              <div class="wert" id="zyklenWert">--</div>
              <div class="label">Ladezyklen</div>
            </div>
            <div class="kz dcb-kz">
              <div id="dcbChips" class="dcb-chips"></div>
              <div class="label dcb-label">SOH je Zellblock</div>
            </div>
          </div>
        </div>

        <div class="mess-bereich">
          <button class="messen" id="messenBtn" type="button">
            <span id="buttonSpinner" class="spinner"></span>
            <span id="messenLabel">Jetzt messen</span>
          </button>
          <div class="zeitstempel">
            Letzte Messung: <span id="letzteMessung">noch keine</span>
          </div>
          <div id="measureError" class="mess-fehler"></div>
        </div>
      </section>

      <div class="warnung" id="warnung"></div>

      <section class="karte chart-karte">
        <div class="chart-kopf">
          <h2>SOH-Verlauf</h2>
          <div class="bereich-schalter" id="bereichSchalter">
            <button data-range="30">30 Tage</button>
            <button data-range="90">90 Tage</button>
            <button data-range="365">1 Jahr</button>
            <button data-range="all" class="aktiv">Alles</button>
          </div>
        </div>
        <div id="emptyState" class="leer">Noch keine Messungen.</div>
        <div class="chart-box"><canvas id="chart"></canvas></div>
      </section>

      <details class="karte tabelle" open>
        <summary>Letzte Messungen</summary>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tabelleBody"></tbody>
          </table>
        </div>
      </details>

      <footer id="footerInfo">e3dcset · SQLite</footer>
    </div>

    <script src="/static/chart.umd.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
